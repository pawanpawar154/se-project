<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<h2>📜 Report History</h2>

<table class="table table-bordered mt-3">
    <tr>
        <th>File</th>
        <th>Result</th>
        <th>Date</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/home" class="btn btn-primary">⬅ Back</a>

</body>
</html>
