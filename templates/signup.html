<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sign Up | MediReport</title>
    <style>
        /* Full-page background */
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url('/static/img.jpg'); /* Replace with your image path */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Centered container */
        .signup-card {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 250px;
            text-align: center;
        }

        .signup-card h3 {
            margin-bottom: 20px;
            color: #333;
        }

        /* Form inputs */
        .signup-card input[type="text"],
        .signup-card input[type="email"],
        .signup-card input[type="password"] {
            width: 90%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
        }

        .signup-card input[type="text"]:focus,
        .signup-card input[type="password"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        /* Button */
        .signup-card button {
            width: 95%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .signup-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Optional: link for login */
        .signup-card .login-link {
            margin-top: 15px;
            display: block;
            font-size: 14px;
            color: #667eea;
            text-decoration: none;
        }

        .signup-card .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h3>📝 Sign Up</h3>

        <form method="POST" action="/signup">

            {% if error %}
            <div style="background:#f8d7da; color:#721c24; padding:10px; border-radius:10px; margin-bottom:15px;">
                {{ error }}
            </div>
            {% endif %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Create Account</button>
        </form>

        <p class="login">
            Already have an account? <a href="/login">Log in</a>
        </p>
        
    </div>

</body>
</html>
