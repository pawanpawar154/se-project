<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MediReport</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    body {
        display: flex;
        margin: 0;
    }

    .sidebar {
    position: fixed;
    left: -250px;
    top: 0;
    width: 250px;
    height: 100vh;
    background: linear-gradient(to bottom, #4b2cff, #6a11cb);
    color: white;
    padding: 80px 20px 20px 20px;  /* ✅ increased top padding */
    transition: 0.3s;
}
    .sidebar.active {
        left: 0;
    }

    .sidebar a {
        color: white;
        text-decoration: none;
        display: block;
        margin: 15px 0;
    }

   .content {
    flex: 1;
    padding: 30px;
    background: transparent;
    width: 100%;
    transition: 0.3s;

    display: flex;              /* ✅ add */
    flex-direction: column;     /* ✅ stack items */
    align-items: center;  
    margin-top: 100px;      /* ✅ center horizontally */
    }
    .content.shift {
        margin-left: 250px;
    }

    .card {
        border-radius: 15px;
        max-width: 500px;   /* ✅ smaller box */
    }

    .toggle-btn {
        font-size: 20px;
        cursor: pointer;
        background: white;
        color: black;
        border: none;
        padding: 10px 15px;
        border-radius: 8px;

        position: fixed;   /* ✅ always visible */
        top: 20px;
        left: 20px;
        z-index: 1100;
    }

    .bg-image {
            position: fixed; /* stay in place */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* scale image */
            z-index: -1; /* behind content */
    }

    .welcome-text {
    color: white;
}

</style>
</head>

<body>


<img src="/static/new.png" class="bg-image">

<!-- Toggle Button -->
<button class="toggle-btn" onclick="toggleSidebar()">☰</button>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
    <h3>🩺 MediReport</h3>
    <hr>

    <p><b>{{ session['user'] }}</b></p>

    <a href="/home">🏠 Dashboard</a>
    <a href="/history">📜 History</a>
    <a href="/profile">👤 Profile</a>
    <a href="/logout">🚪 Logout</a>
</div>



<!-- Main Content -->
<div class="content" id="content">

    <h2 class="welcome-text">Welcome back 👋</h2>

    <div class="card p-3 mt-4 shadow">  <!-- reduced padding -->
        <h5>Upload Medical Report</h5>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" class="form-control mb-2">
            <button class="btn btn-primary btn-sm">Upload & Analyze</button>
        </form>
    </div>

</div>

<!-- JavaScript -->
<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("content").classList.toggle("shift");
    }
</script>

</body>
</html>
